services:
  server:
    build:
      context: ./space-operation-center
      dockerfile: Dockerfile
    container_name: constellation-server
    image: constellation/server:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    ports:
      - "8080:8080"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  mission-service:
    build:
      context: ./mission-scheduler
      dockerfile: Dockerfile
    container_name: mission-service
    image: constellation/mission-service:latest
    depends_on:
      server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8081
      - SERVER_URL=http://server:8080/api  # DNS-имя контейнера в Docker-сети
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8081:8081"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: constellation-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: constellation_db
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  telemetry-service:
    build:
      context: ./telemetry-service
      dockerfile: Dockerfile
    container_name: telemetry-service
    image: constellation/telemetry-service:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - GRPC_SERVER_PORT=9091
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    ports:
      - "9091:9091"
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
    name: constellation-net