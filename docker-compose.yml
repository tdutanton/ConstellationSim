services:
  mission-service:
    build:
      context: ./mission-scheduler
      dockerfile: Dockerfile
    container_name: mission-service
    image: constellation/mission-service:latest
    depends_on:
      server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8081
      - SERVER_URL=http://server:8080/api  # DNS-имя контейнера в Docker-сети
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8081:8081"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  constellation-db:
    image: postgres:15
    container_name: constellation-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: constellation_db
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - constellation_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  telemetry-db:
    image: postgres:15
    container_name: telemetry-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telemetry_db
    ports:
      - "5433:5432"
    networks:
      - app-network
    volumes:
      - telemetry_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./space-operation-center
      dockerfile: Dockerfile
    container_name: constellation-server
    image: constellation/server:latest
    depends_on:
      constellation-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      telemetry-service:
        condition: service_healthy
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=constellation-db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_SATELLITE_EVENTS=satellite-events
    ports:
      - "8080:8080"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  telemetry-service:
    build:
      context: ./telemetry-service
      dockerfile: Dockerfile
    container_name: telemetry-service
    image: constellation/telemetry-service:latest
    depends_on:
      telemetry-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - GRPC_SERVER_PORT=9091
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=telemetry-db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_SATELLITE_EVENTS=satellite-events
      - KAFKA_GROUP_ID=telemetry-service-group
    ports:
      - "9091:9091"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "9091" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  kafka:
    image: apache/kafka:latest
    container_name: constellation-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CLUSTER_ID: "constellation-dev-cluster-001"

      # сетевые настройки
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092, CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo > /dev/tcp/kafka/9092" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  constellation_db_data:
  telemetry_db_data:
  kafka_data:

networks:
  app-network:
    driver: bridge
    name: constellation-net