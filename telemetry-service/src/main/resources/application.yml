server:
  port: 8082

grpc:
  server:
    port: ${GRPC_SERVER_PORT}
    reflection:
      enabled: true

spring:
  application:
    name: telemetry-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: ${KAFKA_GROUP_ID:telemetry-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      properties:
        protobuf.deserializer.message.type: constellation.events.proto.SatelliteEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true