server:
  port: 8082

grpc:
  server:
    port: ${GRPC_SERVER_PORT}
    reflection:
      enabled: true

spring:
  application:
    name: telemetry-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true